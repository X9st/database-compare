name: dbcompare-multidb

services:
  mysql:
    image: mysql:8.4
    container_name: dbcmp-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-Root_123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-qa_compare_mysql}
      TZ: ${TZ:-Asia/Shanghai}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_general_ci
      - --default-time-zone=+08:00
    ports:
      - "${MYSQL_PORT:-33306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  oracle:
    image: gvenzl/oracle-free:23-slim
    container_name: dbcmp-oracle
    restart: unless-stopped
    environment:
      ORACLE_PASSWORD: ${ORACLE_SYS_PASSWORD:-Oracle_123456}
      APP_USER: ${ORACLE_APP_USER:-qa_compare}
      APP_USER_PASSWORD: ${ORACLE_APP_PASSWORD:-OracleApp_123456}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${ORACLE_PORT:-31521}:1521"
    volumes:
      - oracle_data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 20s
      timeout: 10s
      retries: 20
      start_period: 60s

  oracle-init:
    image: gvenzl/oracle-free:23-slim
    container_name: dbcmp-oracle-init
    depends_on:
      oracle:
        condition: service_healthy
    environment:
      ORACLE_APP_USER: ${ORACLE_APP_USER:-qa_compare}
      ORACLE_APP_PASSWORD: ${ORACLE_APP_PASSWORD:-OracleApp_123456}
      ORACLE_SERVICE: ${ORACLE_SERVICE:-FREEPDB1}
    volumes:
      - ./oracle/init:/init:ro
    entrypoint: ["/bin/bash", "/init/run-init.sh"]
    restart: "no"

volumes:
  mysql_data:
  oracle_data:
